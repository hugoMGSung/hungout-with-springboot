## 콘솔로그 색상
spring.output.ansi.enabled=always
## Log4J 설정
logging.level.org.springframework=info
logging.level.com.hugo83=debug
logging.level.org.springframework.security=trace
## DB 설정
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.jdbc-url=jdbc:mariadb://localhost:3326/toybatis
spring.datasource.username=toybatis
spring.datasource.password=toybatis
spring.datasource.mapper-locations=classpath:/mapper/**/*.xml
# Mapper Xml Location
# mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
## SWAGGER
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER