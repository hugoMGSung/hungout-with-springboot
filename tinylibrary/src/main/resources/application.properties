## 한글 인코딩
server.servlet.encoding.charset=utf-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
## 콘솔로그 색상
spring.output.ansi.enabled=always
## DB 설정
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3326/tinylibrary
spring.datasource.username=toyoneuser
spring.datasource.password=toyonepassw0rd
## Spring Data JPA 설정
## create-drop | update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
## Auto resource sync/reload
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true
## 첨부파일 설정
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=D:\\upload
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.max-file-size=10MB
## 사용자정의 업로드 경로
com.hugo83.upload.path=D:\\upload