<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="Responsive Admin &amp; Dashboard Template based on Bootstrap 5">
	<meta name="author" content="AdminKit">
	<meta name="keywords" content="adminkit, bootstrap, bootstrap 5, admin, dashboard, template, responsive, css, sass, html, theme, front-end, ui kit, web">

	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link rel="shortcut icon" th:href="@{/img/icons/icon-48x48.png}" />

	<link rel="canonical" href="https://demo-basic.adminkit.io/pages-sign-in.html" />

	<title>로그인 | AdminKit Demo</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" 
		integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
	<link th:href="@{/css/app.css}" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

	<script src="https://code.jquery.com/jquery-3.7.1.slim.min.js"
			integrity="sha256-kmHvs0B+OpCW5GVHUNjv9rOmY0IvSIRcf7zGUDTDQM8="
			crossorigin="anonymous"></script>
	<script>
		$(document).ready(function() {
			$('#email').focus();
		});
	</script>
</head>

<body>
	<main class="d-flex w-100">
		<div class="container d-flex flex-column">
			<div class="row vh-100">
				<div class="col-sm-10 col-md-8 col-lg-6 mx-auto d-table h-100">
					<div class="d-table-cell align-middle">

						<div class="text-center mt-4">
							<h1 class="h2">Welcome back, Someone!!</h1>
							<p class="lead">
								Sign in to your account to continue
							</p>
						</div>

						<div class="card">
							<div class="card-body">
								<div class="m-sm-4">
									<div class="text-center">
										<img th:src="@{/img/avatars/avatar.jpg}" alt="Charles Hall" class="img-fluid rounded-circle" width="132" height="132" />
									</div>
									<form action="/member/login" method="post" class="row g-3 validated-form" novalidate>
										<div class="mb-3">
											<label class="form-label">이메일</label>
											<input class="form-control form-control-lg" type="email" id="email" name="username" placeholder="이메일 입력" required />
											<div class="invalid-feedback">
												이메일을 입력하세요.
											</div>
										</div>
										<div class="mb-3">
											<label class="form-label">패스워드</label>
											<input class="form-control form-control-lg" type="password" name="password" placeholder="패스워드 입력" required />
											<div class="invalid-feedback">
												패스워드를 입력하세요.
											</div>
											<small>
												<a th:href="@{/index.html}">Forgot password?</a>
											</small>
										</div>
										<div>
											<label class="form-check">
												<input class="form-check-input" type="checkbox" value="remember-me" name="remember-me" checked>
												<span class="form-check-label">
												기억하기
												</span>
											</label>
										</div>
										<div class="text-center mt-3">
											<button type="submit" class="btn btn-primary">로그인</button>
											<a th:href="@{/member/join}" class="btn btn-secondary">회원가입</a>
										</div>
									</form>
								</div>
							</div>
						</div>

					</div>
				</div>
			</div>
		</div>
	</main>

	<script th:src="@{/js/app.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" 
			integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
	<script>
		const result = '[[${result}]]'; // 이렇게 해야 하는게 오류가 나있었다!!!!
		if (result) {
			alert('[[${message}]]');
		} 

		const errors = '[[${errors}]]';
		console.log(errors);

		// Example starter JavaScript for disabling form submissions if there are invalid fields
		(() => {
			"use strict";

			// Fetch all the forms we want to apply custom Bootstrap validation styles to
			const forms = document.querySelectorAll(".validated-form");

			// Loop over them and prevent submission
			Array.from(forms).forEach((form) => {
			form.addEventListener(
				"submit",
				(event) => {
				if (!form.checkValidity()) {
					event.preventDefault();
					event.stopPropagation();
				}

				form.classList.add("was-validated");
				},
				false
			);
			});
		})();
	</script>
</body>

</html>
