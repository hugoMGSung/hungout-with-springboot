<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin_base.html}">

<div layout:fragment="content">
	<div class="row g-4">
		<div class="col-12">
			<div class="bg-light rounded h-100 p-4">
				<div class="row justify-content-between">
					<div class="col-4">
						<h6 class="mb-4">도서 리스트</h6>
					</div>
					<div class="col-4">
						<div class="float-end">
							<a href="/books/register" class="btn btn-primary btn-sm">등록</a>
						</div>	
					</div>
				  </div>
				
				<table class="table table-striped table-hover">
					<thead>
						<tr>
							<th scope="col">#</th>
							<th scope="col">책제목</th>
							<th scope="col">저자</th>
							<th scope="col">출판일</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="dto:${responseDTO.dtoList}">
							<th scope="row">[[${dto.bookId}]]</th>
							<td>
								<a th:href="|@{/books/read(bookId =${dto.bookId})}|">
									[[${dto.title}]]
								</a>
							</td>
							<td>[[${dto.writer}]]</td>
							<td>[[${dto.releaseDate}]]</td>
						</tr>
					</tbody>
				</table>

				<div class="float-end">
					<ul class="pagination flex-wrap">

						<li class="page-item" th:if="${responseDTO.prev}">
							<a class="page-link" th:data-num="${responseDTO.start -1}">Previous</a>
						</li>

						<th:block th:each="i: ${#numbers.sequence(responseDTO.start, responseDTO.end)}">
							<li th:class="${responseDTO.page == i}?'page-item active':'page-item'" >
								<a class="page-link" th:data-num="${i}">[[${i}]]</a>
							</li>
						</th:block>

						<li class="page-item" th:if="${responseDTO.next}">
							<a class="page-link"  th:data-num="${responseDTO.end + 1}">Next</a>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>

</div>

<script layout:fragment="bottomScript" th:inline="javascript">
	document.querySelector(".pagination").addEventListener("click", function (e) {
	 	e.preventDefault();
	 	e.stopPropagation();

		const target = e.target;

		if(target.tagName !== 'A') {
			return;
		}

		const num = target.getAttribute("data-num");
		//alert(num);
		self.location = `/books/list?page=${num}`;
	},false);
</script>
